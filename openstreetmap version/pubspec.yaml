name: trabcdefg
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.20+16

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # --- Core & UI ---
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  collection: ^1.19.1
  meta: ^1.16.0
  get: ^4.7.2
  provider: ^6.1.5+1
  flutter_phoenix: ^1.1.1
  table_calendar: ^3.2.0
  sliding_up_panel: ^2.0.0+1
  timeago: ^3.6.0

  # --- Networking ---
  dio: ^5.4.0
  http: ^1.5.0
  http_auth: ^1.0.1
  web_socket_channel: ^3.0.3
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.3.0
  dio_cache_interceptor_hive_store: ^4.0.0

  # --- Storage & Database ---
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  http_cache_hive_store: ^5.0.1

  # --- Maps & Locations ---
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  maplibre_gl: 0.25.0
  location: ^8.0.1
  flutter_map_cache: ^1.5.2
  flutter_map_tile_caching: ^10.1.1
  dart_geohash: ^2.1.0

  # --- Utilities & Services ---
  csv: ^6.0.0
  permission_handler: ^12.0.1
  mobile_scanner: ^7.0.1
  package_info_plus: ^8.2.1
  url_launcher: ^6.3.2
  excel: ^4.0.6
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: any
  openapi_generator: any
  openapi_generator_annotations: any
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    # Styles & Configurations
    - assets/styles/
    
    # Internal Databases
    - assets/sqldb/chinese_ultra_res.db
    - assets/sqldb/english_ultra_res.db
    - assets/sqldb/myanmar_ultra_res_my.db
    
    # Static Assets & Icons
    - assets/images/
